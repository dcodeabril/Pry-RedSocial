<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Facebook Local</title>
    
    <script>
        (function() {
            const rol = localStorage.getItem('rol') || localStorage.getItem('usuarioRol');
            const miId = localStorage.getItem('usuarioId');
            if (rol !== 'admin' && miId !== '1') {
                window.location.href = 'index.html'; 
            }
        })();
    </script>
    
    <script src="js/guardia.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css"> 
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/buscar.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Admin HQ</h1></div>

        <nav class="main-nav">
            <ul class="nav-menu">
                <li class="list">
                    <a href="index.html">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Muro</span>
                    </a>
                </li>
                <li class="list active">
                    <a href="admin.html">
                        <span class="icon"><i class="fa-solid fa-screwdriver-wrench"></i></span>
                        <span class="text">Control</span>
                    </a>
                </li>
                <li class="list">
                    <button id="btn-tema" class="btn-icon-toggle">
                        <span class="icon"><i class="fa-solid fa-moon" id="theme-icon"></i></span>
                        <span class="text">Tema</span>
                    </button>
                </li>
                <li class="list">
                    <a href="#" onclick="cerrarSesionTotal()">
                        <span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="text">Salir</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>

            <!-- 🛠️ CAMBIO: Identidad Dinámica aplicada al Administrador -->
            <a href="#" onclick="irAMiPerfil()" id="nav-nombre" class="nav-user-link">
                <div id="user-avatar-nav" class="avatar-dinamico-nav"></div>
                <span id="user-name-text">Cargando...</span> 
            </a> 
        </nav>
    </header>

    <main class="container">
        <!-- SECCIÓN DE REPORTES -->
        <section class="admin-section card">
            <div class="admin-card-header urgent">
                <h2><i class="fa-solid fa-triangle-exclamation"></i> Reportes de la Comunidad</h2>
                <span id="contador-reportes" class="admin-badge">0 Pendientes</span>
            </div>
            
            <div class="admin-body">
                <div id="lista-reportes-admin" class="report-list-container">
                    <p class="loading-text">Sincronizando denuncias...</p>
                </div>

                <div class="admin-footer-actions">
                    <a href="admin_reportes.html" class="btn-admin-primary">
                        <span>Gestionar Denuncias Detalladas</span>
                        <i class="fa-solid fa-gavel"></i>
                    </a>
                </div>
            </div>
        </section>

        <!-- SECCIÓN DE USUARIOS -->
        <section class="admin-section card">
            <div class="admin-card-header">
                <h2><i class="fa-solid fa-users-gear"></i> Control de Usuarios</h2>
                <div id="msg"></div>
            </div>
            
            <div class="admin-body">
                <div class="admin-table-container">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Email</th>
                                <th>Rango</th>
                                <th>Estado</th>
                                <th>Operaciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/admin.js"></script>

    <!-- 🛠️ NUEVO SCRIPT: Resolución de errores y Avatar Dinámico -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre');
            const foto = localStorage.getItem('foto');
            
            if(nombre) {
                document.getElementById('user-name-text').innerText = nombre;
                
                // --- 🧠 LÓGICA DE AVATAR NAV ---
                const avatarNav = document.getElementById('user-avatar-nav');
                if (avatarNav) {
                    if (foto && foto !== 'null' && foto !== '' && !foto.includes('default')) {
                        avatarNav.innerHTML = `<img src="${foto}" alt="Perfil" class="img-avatar-nav">`;
                    } else {
                        const iniciales = nombre.split(' ').map(p => p[0]).join('').toUpperCase().substring(0, 2);
                        avatarNav.innerHTML = `<span class="iniciales-text" style="color:white; font-weight:800; font-size:0.8rem;">${iniciales}</span>`;
                    }
                }
            }
        });

        // 🚀 Solución al error de redirección
        function irAMiPerfil() {
            const miId = localStorage.getItem('usuarioId');
            if(miId) {
                window.location.href = `perfil.html?id=${miId}`;
            } else {
                window.location.href = '/auth.html';
            }
        }

        function cerrarSesionTotal() {
            if(confirm("¿Deseas cerrar sesión de forma segura?")) {
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.href = '/auth.html'; 
            }
        }
    </script>
</body>
</html>

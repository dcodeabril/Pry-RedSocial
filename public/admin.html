<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - Facebook Local</title>
    
    <script>
        (function() {
            const rol = localStorage.getItem('rol') || localStorage.getItem('usuarioRol');
            const miId = localStorage.getItem('usuarioId');
            if (rol !== 'admin' && miId !== '1') {
                window.location.href = 'index.html'; 
            }
        })();
    </script>
    
    <script src="js/guardia.js"></script>
    <link rel="stylesheet" href="css/general.css"> <link rel="stylesheet" href="css/admin.css">   </head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Admin Control Center</h1></div>
        <nav>
            <a href="index.html">Ver Muro</a>
            <button id="btn-tema" class="btn-base">🌙 Modo Oscuro</button>
        </nav>
    </header>

    <main class="container">
        <section class="admin-section card">
            <div class="header-admin">
                <h2>🚩 Reportes de la Comunidad</h2>
                <span id="contador-reportes" class="badge">Cargando...</span>
            </div>
            
            <div id="lista-reportes-admin" class="report-list-container">
                <p>Cargando denuncias...</p>
            </div>

            <div class="admin-footer-actions">
                <a href="admin_reportes.html" class="btn-admin-action">
                    Gestionar Denuncias Detalladas ⚖️
                </a>
            </div>
        </section>

        <hr class="separator-heavy">

        <section class="admin-section card">
            <h2>👥 Control de Usuarios</h2>
            <div id="msg"></div>
            
            <div class="admin-table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-usuarios">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/tema.js"></script>
    <script src="js/admin.js"></script> 
</body>
</html>

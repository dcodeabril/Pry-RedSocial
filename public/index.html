<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muro - Facebook Local</title>
    
    <script src="js/guardia.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/general.css"> 
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/notas.css">
    <link rel="stylesheet" href="css/publicaciones.css"> 
    <link rel="stylesheet" href="css/videollamada.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>FL</h1>
        </div>

        <div class="buscador-contenedor">
            <input type="text" id="input-busqueda" placeholder="🔍 Buscar...">
            <div id="resultados-busqueda"></div>
        </div>

        <nav class="main-nav">
            <ul class="nav-menu">
                <li class="list">
                    <a href="index.html" title="Muro">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Muro</span>
                    </a>
                </li>
                <li class="list">
                    <a href="mensajes.html" title="Mensajes">
                        <span class="icon"><i class="fa-solid fa-comment-dots"></i></span>
                        <span class="text">Mensajes</span>
                    </a>
                </li>
                <li class="list">
                    <a href="notificaciones.html" title="Notificaciones">
                        <span class="icon">
                            <i class="fa-solid fa-bell"></i>
                            <span id="contador-notificaciones" class="badge-notif">0</span>
                        </span>
                        <span class="text">Avisos</span>
                    </a>
                </li>
                <li class="list">
                    <a href="#" onclick="abrirModalEvento()" title="Crear Evento">
                        <span class="icon"><i class="fa-solid fa-calendar-plus"></i></span>
                        <span class="text">Evento</span>
                    </a>
                </li>
                <li class="list">
                    <a href="baul.html" title="Mis Tesoros">
                        <span class="icon"><i class="fa-solid fa-box-open"></i></span>
                        <span class="text">Baúl</span>
                    </a>
                </li>
                <li class="list">
                    <button id="btn-tema" class="btn-icon-toggle">
                        <span class="icon"><i class="fa-solid fa-moon" id="theme-icon"></i></span>
                    </button>
                </li>
                <li class="list">
                    <a href="#" onclick="cerrarSesionTotal()" title="Cerrar Sesión">
                        <span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="text">Salir</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>

            <a href="#" onclick="irAMiPerfil()" id="nav-nombre" class="nav-user-link" title="Mi Perfil">
                <i class="fa-solid fa-user"></i>
                <span id="user-name-text">Cargando...</span> 
            </a> 
        </nav>
    </header>

    <main class="container">
        <section class="notas-wrapper">
            <div id="lista-notas">
                <div class="nota-item" onclick="abrirModalNota()">
                    <div class="nota-burbuja">
                        <span class="nota-plus-icon">+</span>
                    </div>
                    <small>Tu nota</small>
                </div>
                <div id="notas-dinamicas"></div>
            </div>
        </section>

        <section class="card create-post">
            <textarea id="post-contenido" placeholder="¿Qué estás pensando?"></textarea>
            <div class="post-actions-toolbar">
                <div class="post-privacy-selector">
                    <select id="post-privacidad">
                        <option value="publica">🌎 Pública</option>
                        <option value="amigos">👥 Amigos</option>
                        <option value="solo_yo">🔒 Solo yo</option>
                    </select>
                </div>
                <button id="btn-publicar" class="btn-vibrant">Publicar</button>
            </div>
        </section>

        <section id="feed"></section>
    </main>

    <div id="modal-videollamada" class="modal-video-overlay video-modal-hidden">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline class="video-remote"></video>
            <video id="localVideo" autoplay playsinline muted class="video-local"></video>
            <div class="video-header-info">
                <div id="video-status" class="video-status-tag">Iniciando...</div>
            </div>
            
            <div id="controles-entrantes" class="video-controles-hidden incoming-call-controls">
                <button onclick="aceptarLlamadaClick()" class="btn-vibrant success-call">
                    <i class="fa-solid fa-phone"></i> Responder Llamada
                </button>
            </div>

            <div class="video-footer-controls">
                <button id="btn-mic" onclick="toggleMic()" class="btn-video-tool">🎤</button>
                <button onclick="colgarYSalir()" class="btn-hangup">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
                <button id="btn-cam" onclick="toggleCam()" class="btn-video-tool">📷</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script> 
    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/buscar.js"></script> 
    <script src="js/notas.js"></script>
    <script src="js/eventos.js"></script>
    <script src="js/videollamada.js"></script> 
    <script src="js/publicaciones.js"></script>
    <script src="js/notificaciones.js"></script> 

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombreUsuario = localStorage.getItem('nombre');
            const rolUsuario = localStorage.getItem('rol');
            
            if (nombreUsuario) {
                const nameText = document.getElementById('user-name-text');
                if (nameText) nameText.innerText = nombreUsuario;
                
                const postText = document.getElementById('post-contenido');
                if (postText) postText.placeholder = `¿Qué estás pensando, ${nombreUsuario}?`;
            }

            if (rolUsuario === 'admin') {
                const btnAdmin = document.getElementById('btn-admin-nav');
                if (btnAdmin) btnAdmin.style.display = 'inline-block';
            }
        });

        function irAMiPerfil() {
            const miId = localStorage.getItem('usuarioId');
            if(miId) window.location.href = `perfil.html?id=${miId}`;
            else window.location.href = '/auth.html';
        }

        function cerrarSesionTotal() {
            if(confirm("¿Deseas cerrar sesión de forma segura?")) {
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.href = '/auth.html'; 
            }
        }
    </script>
</body>
</html>

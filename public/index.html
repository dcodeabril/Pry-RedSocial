<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facebook Local - Muro</title>
    <link rel="stylesheet" href="css/general.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Facebook Local</h1></div>
        <nav>
            <a href="index.html">Muro</a>
            <a href="mensajes.html">Mensajes</a>
            <a href="notificaciones.html">Notificaciones</a>
            <a href="eventos.html">Eventos</a>
            <button id="btn-tema" class="btn-secundario">🌙 Modo Oscuro</button>
        </nav>
    </header>

    <main class="container">
        <section class="card create-post">
            <textarea id="post-contenido" placeholder="¿Qué estás pensando, Diego?"></textarea>
            <div class="post-actions">
                <select id="post-privacidad">
                    <option value="publica">Pública</option>
                    <option value="amigos">Amigos</option>
                    <option value="solo_yo">Solo yo</option>
                </select>
                <button id="btn-publicar">Publicar</button>
            </div>
        </section>

        <section id="feed">
            </section>
    </main>

    <script src="js/publicaciones.js"></script>
    <script src="js/tema.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facebook Local - Mensajes</title>
    <script src="js/guardia.js"></script>
    <link rel="stylesheet" href="css/general.css">
    <style>
        .chat-layout { display: flex; height: calc(100vh - 120px); gap: 20px; margin-top: 20px; }
        .sidebar-amigos { width: 30%; padding: 15px; border-radius: 8px; overflow-y: auto; }
        .chat-window { width: 70%; display: flex; flex-direction: column; padding: 15px; border-radius: 8px; }
        .mensajes-lista { flex-grow: 1; overflow-y: auto; border-bottom: 1px solid var(--border-color); margin-bottom: 15px; padding: 10px; }
        
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 15px; max-width: 80%; }
        .msg-emisor { align-self: flex-end; background-color: #007bff; color: white; text-align: right; margin-left: auto; }
        .msg-receptor { align-self: flex-start; background-color: #e4e6eb; color: #050505; text-align: left; }
        
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex-grow: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
        
        #chat-header { font-weight: bold; padding-bottom: 10px; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .amigo-item { cursor: pointer; padding: 10px; border-radius: 5px; list-style: none; margin-bottom: 5px; transition: background 0.3s; }
        .amigo-item:hover { background: rgba(0, 123, 255, 0.1); }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Facebook Local</h1></div>
        <nav style="display: flex; align-items: center; gap: 15px;">
            <a href="index.html">Muro</a>
            <a href="#" onclick="irAMiPerfil()" id="nav-nombre">Mi Perfil</a> 
            <a href="mensajes.html" class="active">Mensajes</a>
            <a href="notificaciones.html">Notificaciones</a>
            <a href="#" onclick="cerrarSesionTotal()" style="color: #ff4d4d; font-weight: bold; margin-left: 15px;">Cerrar Sesión</a>
            <button id="btn-tema" class="btn-secundario" style="margin-left: 10px;">🌙</button>
        </nav>
    </header>

    <main class="container chat-layout">
        <aside class="card sidebar-amigos">
            <h3>Contactos</h3>
            <ul id="lista-amigos"></ul>
        </aside>

        <section class="card chat-window">
            <div id="chat-header">Selecciona un amigo para chatear</div>
            <div id="mensajes-body" class="mensajes-lista d-flex flex-column"></div>
            <div class="chat-input">
                <input type="text" id="input-msj" placeholder="Escribe un mensaje...">
                <button id="btn-enviar" class="btn-primario">Enviar</button>
            </div>
        </section>
    </main>

    <div id="modal-videollamada" class="modal-video-overlay" style="display: none;">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline class="video-remote"></video>
            <video id="localVideo" autoplay playsinline muted class="video-local"></video>
            <div class="video-status" id="video-status">Llamando...</div>

            <div id="controles-entrantes" style="display: none; position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 100;">
                <button onclick="aceptarLlamadaClick()" style="background: #28a745; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
                    ✅ Contestar Llamada
                </button>
            </div>

            <div class="video-controls">
                <button onclick="colgarYSalir()" class="control-btn btn-hangup">📞</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/videollamada.js"></script> 
    <script src="js/mensajes.js"></script>
    
    <script>
        // ✅ NAVEGACIÓN DINÁMICA
        function irAMiPerfil() {
            const miId = localStorage.getItem('usuarioId');
            if(miId) window.location.href = `perfil.html?id=${miId}`;
            else window.location.href = '/';
        }

        // ✅ LIMPIEZA TOTAL DE SESIÓN
        function cerrarSesionTotal() {
            if(confirm("¿Deseas cerrar sesión de forma segura?")) {
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>

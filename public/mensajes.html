<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajes - Facebook Local</title>
    
    <script src="js/guardia.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/general.css"> 
    <link rel="stylesheet" href="css/index.css"> <link rel="stylesheet" href="css/mensajes.css"> 
    <link rel="stylesheet" href="css/buscar.css"> <link rel="stylesheet" href="css/videollamada.css">
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>FL</h1>
        </div>

        <div class="buscador-contenedor">
            <input type="text" id="input-busqueda" placeholder="🔍 Buscar contactos...">
            <div id="resultados-busqueda"></div>
        </div>

        <nav class="main-nav">
            <ul class="nav-menu">
                <li class="list">
                    <a href="index.html" title="Muro">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Muro</span>
                    </a>
                </li>
                <li class="list active"> <a href="mensajes.html" title="Mensajes">
                        <span class="icon"><i class="fa-solid fa-comment-dots"></i></span>
                        <span class="text">Mensajes</span>
                    </a>
                </li>
                <li class="list">
                    <a href="notificaciones.html" title="Notificaciones">
                        <span class="icon">
                            <i class="fa-solid fa-bell"></i>
                            <span id="contador-notificaciones" class="badge-notif">0</span>
                        </span>
                        <span class="text">Avisos</span>
                    </a>
                </li>
                <li class="list">
                    <button id="btn-tema" class="btn-icon-toggle">
                        <span class="icon"><i class="fa-solid fa-moon" id="theme-icon"></i></span>
                    </button>
                </li>
                <li class="list">
                    <a href="#" onclick="cerrarSesionTotal()" title="Cerrar Sesión">
                        <span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="text">Salir</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>

            <!-- 🛠️ AJUSTE: Avatar dinámico en lugar de icono estático -->
            <a href="#" onclick="irAMiPerfil()" id="nav-nombre" class="nav-user-link">
                <div id="user-avatar-nav" class="avatar-dinamico-nav"></div>
                <span id="user-name-text">Cargando...</span> 
            </a> 
        </nav>
    </header>

    <main class="container chat-layout">
        <aside class="sidebar-amigos">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-address-book"></i> Contactos</h3>
            </div>
            <ul id="lista-amigos"></ul>
        </aside>

        <section class="chat-window card">
            <div id="chat-header" class="chat-header-empty">
                Selecciona un amigo para iniciar la conversación
            </div>
            
            <div id="mensajes-body" class="mensajes-lista">
                </div>

            <div class="chat-input-container">
                <input type="text" id="input-msj" placeholder="Escribe un mensaje industrial...">
                <button id="btn-enviar" class="btn-vibrant">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </section>
    </main>

    <div id="modal-videollamada" class="modal-video-overlay video-modal-hidden">
        <div class="video-container">
            <video id="remoteVideo" autoplay playsinline class="video-remote"></video>
            <video id="localVideo" autoplay playsinline muted class="video-local"></video>
            <div class="video-header-info">
                <div id="video-status" class="video-status-tag">Llamando...</div>
            </div>
            
            <div id="controles-entrantes" class="video-controles-hidden incoming-call-controls">
                <button onclick="aceptarLlamadaClick()" class="btn-vibrant success-call">
                    <i class="fa-solid fa-phone"></i> Responder
                </button>
            </div>

            <div class="video-footer-controls">
                <button onclick="colgarYSalir()" class="btn-hangup">
                    <i class="fa-solid fa-phone-slash"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/buscar.js"></script>
    <script src="js/videollamada.js"></script> 
    <script src="js/mensajes.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre');
            const foto = localStorage.getItem('foto');
            
            if (nombre) {
                document.getElementById('user-name-text').innerText = nombre;

                // --- 🧠 LÓGICA DE AVATAR PROPIO DINÁMICO ---
                const avatarNav = document.getElementById('user-avatar-nav');
                if (avatarNav) {
                    if (foto && foto !== 'null' && foto !== '') {
                        avatarNav.innerHTML = `<img src="${foto}" alt="Perfil" class="img-avatar-nav">`;
                    } else {
                        // Extraer iniciales (Ej: Michelle Carvajal -> MC)
                        const iniciales = nombre.split(' ')
                            .map(p => p[0])
                            .join('')
                            .toUpperCase()
                            .substring(0, 2);
                        
                        avatarNav.innerHTML = `<span class="iniciales-text">${iniciales}</span>`;
                    }
                }
            }
        });

        function irAMiPerfil() {
            const miId = localStorage.getItem('usuarioId');
            if(miId) window.location.href = `perfil.html?id=${miId}`;
            else window.location.href = '/auth.html';
        }

        function cerrarSesionTotal() {
            if(confirm("¿Deseas cerrar sesión de forma segura?")) {
                localStorage.clear(); 
                sessionStorage.clear();
                window.location.href = '/auth.html'; 
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Baúl de Tesoros - Facebook Local</title>
    
    <script src="js/guardia.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css"> 
    <link rel="stylesheet" href="css/index.css"> <link rel="stylesheet" href="css/baul.css"> 
</head>
<body>
    <header class="main-header">
        <div class="logo">
            <h1>FL</h1>
        </div>

        <nav class="main-nav">
            <ul class="nav-menu">
                <li class="list">
                    <a href="index.html" title="Muro">
                        <span class="icon"><i class="fa-solid fa-house"></i></span>
                        <span class="text">Muro</span>
                    </a>
                </li>
                <li class="list">
                    <a href="mensajes.html" title="Mensajes">
                        <span class="icon"><i class="fa-solid fa-comment-dots"></i></span>
                        <span class="text">Mensajes</span>
                    </a>
                </li>
                <li class="list active">
                    <a href="baul.html" title="Mis Tesoros">
                        <span class="icon"><i class="fa-solid fa-box-open"></i></span>
                        <span class="text">Baúl</span>
                    </a>
                </li>
                <li class="list">
                    <button id="btn-tema" class="btn-icon-toggle">
                        <span class="icon"><i class="fa-solid fa-moon" id="theme-icon"></i></span>
                    </button>
                </li>
                <li class="list">
                    <a href="#" onclick="cerrarSesionTotal()" title="Cerrar Sesión">
                        <span class="icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                        <span class="text">Salir</span>
                    </a>
                </li>
                <div class="indicator"></div>
            </ul>

            <!-- 🛠️ IDENTIDAD DINÁMICA: Avatar del usuario actual en la Nav -->
            <a href="#" onclick="irAMiPerfil()" id="nav-nombre" class="nav-user-link" title="Mi Perfil">
                <div id="user-avatar-nav" class="avatar-dinamico-nav"></div>
                <span id="user-name-text">Cargando...</span> 
            </a> 
        </nav>
    </header>

    <main class="container">
        <header class="baul-header">
            <h2><i class="fa-solid fa-gem"></i> Mi Baúl de Tesoros</h2>
            <p>Aquí descansan los posts que decidiste conservar para la posteridad.</p>
        </header>

        <section id="baul-feed">
            <div class="baul-empty">
                <i class="fa-solid fa-key fa-spin"></i>
                <p>Abriendo tu baúl privado... 🗝️</p>
            </div>
        </section>
    </main>

    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/baul.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const nombre = localStorage.getItem('nombre');
            const foto = localStorage.getItem('foto');
            
            if (nombre) {
                // Actualizar nombre en la nav
                const nameText = document.getElementById('user-name-text');
                if (nameText) nameText.innerText = nombre;

                // --- 🧠 LÓGICA DE AVATAR DINÁMICO ---
                const avatarNav = document.getElementById('user-avatar-nav');
                if (avatarNav) {
                    if (foto && foto !== 'null' && foto !== '') {
                        avatarNav.innerHTML = `<img src="${foto}" alt="Perfil" class="img-avatar-nav">`;
                    } else {
                        // Extraer iniciales de forma segura
                        const iniciales = nombre.split(' ')
                            .map(p => p[0])
                            .join('')
                            .toUpperCase()
                            .substring(0, 2);
                        
                        avatarNav.innerHTML = `<span class="iniciales-text">${iniciales}</span>`;
                    }
                }
            }
        });

        function irAMiPerfil() {
            const miId = localStorage.getItem('usuarioId');
            if(miId) window.location.href = `perfil.html?id=${miId}`;
            else window.location.href = '/auth.html';
        }

        function cerrarSesionTotal() {
            if(confirm("¿Deseas cerrar el baúl y salir de forma segura?")) {
                localStorage.clear();
                window.location.href = '/auth.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración - Facebook Local</title>
    <script src="js/guardia.js"></script>
    <link rel="stylesheet" href="css/general.css">
</head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Facebook Local</h1></div>
        <nav>
            <a href="index.html">Muro</a>
            <a href="perfil.html" id="nav-nombre">Mi Perfil</a> 
            <a href="mensajes.html">Mensajes</a>
            <a href="ajustes.html" class="active">Ajustes</a>
            <a href="#" id="btn-salir" style="color: #ff4d4d; font-weight: bold; margin-left: 15px;">Cerrar Sesión</a>
            <button id="btn-tema" class="btn-secundario" style="margin-left: 10px;">🌙 Modo Oscuro</button>
        </nav>
    </header>

    <main class="container">
        <div class="card">
            <h2>Ajustes de Cuenta y Perfil</h2>
            <p>Modifica tu información personal y preferencias de seguridad.</p>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">
            
            <form id="form-ajustes">
                
                <div class="form-group">
                    <label for="edit-nombre">Nombre:</label>
                    <input type="text" id="edit-nombre" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="edit-apellido">Apellido:</label>
                    <input type="text" id="edit-apellido" placeholder="Tu apellido" required>
                </div>

                <div class="form-group">
                    <label for="edit-bio">Biografía (BIO):</label>
                    <textarea id="edit-bio" rows="3" placeholder="Cuéntanos sobre ti..."></textarea>
                </div>

                <div class="form-group">
                    <label for="edit-password">Nueva Contraseña (Exactamente 12 caracteres):</label>
                    <input type="password" id="edit-password" placeholder="Dejar en blanco para no cambiar">
                    <small style="display: block; margin-top: 5px; opacity: 0.7;">
                        La regla del Arquitecto exige 12 caracteres si deseas actualizarla.
                    </small>
                </div>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border-color);">

                <div class="form-group">
                    <label for="adj-foto-url">URL de Foto de Perfil:</label>
                    <input type="text" id="adj-foto-url" placeholder="https://ejemplo.com/foto.jpg">
                </div>

                <div class="form-group">
                    <label for="adj-tema">Tema del Sistema:</label>
                    <select id="adj-tema">
                        <option value="claro">☀️ Modo Claro</option>
                        <option value="oscuro">🌙 Modo Oscuro</option>
                    </select>
                </div>

                <button type="submit" id="btn-guardar-ajustes" class="btn-primario" style="margin-top: 20px; width: 100%;">
                    Guardar Cambios Permanentes ✅
                </button>
            </form>
        </div>
    </main>

    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/ajustes.js"></script>

    <script>
        document.getElementById('btn-salir').addEventListener('click', (e) => {
            e.preventDefault();
            if(confirm("¿Estás seguro de que deseas cerrar sesión?")) {
                localStorage.removeItem('usuarioId');
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>

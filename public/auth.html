<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido - Facebook Local</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css"> 
    <link rel="stylesheet" href="css/auth.css">    
</head>
<body class="auth-page">

    <div class="auth-card" id="auth-card">
        
        <div class="panel-welcome" id="panel-welcome">
            <div class="welcome-content">
                <h1>Facebook Local</h1>
                <p id="side-text">¿No tienes una cuenta?</p>
                <button class="btn-ghost" id="btn-toggle-side" onclick="toggleAuth()">Registrarse</button>
            </div>
        </div>

        <div class="panel-form">
            <div class="form-content">
                
                <div id="login-section" class="form-view">
                    <h2 class="auth-title">Iniciar Sesión</h2>
                    
                    <div class="input-container">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="login-email" placeholder="Correo electrónico" required>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="login-pass" placeholder="Contraseña" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="toggleViewPassword('login-pass', this)"></i>
                    </div>
                    
                    <button id="btn-entrar" class="btn-vibrant">Entrar</button>
                </div>

                <div id="register-section" class="form-view auth-hidden">
                    <h2 class="auth-title">Crear Cuenta</h2>
                    
                    <div class="input-container">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="reg-nombre" placeholder="Nombre de usuario" required>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="reg-email" placeholder="Correo electrónico" required>
                    </div>

                    <div class="input-container">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="reg-pass" placeholder="Crea tu contraseña" required>
                        <i class="fa-solid fa-eye toggle-password" onclick="toggleViewPassword('reg-pass', this)"></i>
                    </div>

                    <button id="btn-registrar" class="btn-vibrant">Registrarme</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Función para mostrar/ocultar contraseña
        function toggleViewPassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        function toggleAuth() {
            const card = document.getElementById('auth-card');
            const login = document.getElementById('login-section');
            const register = document.getElementById('register-section');
            const sideText = document.getElementById('side-text');
            const btnToggle = document.getElementById('btn-toggle-side');

            card.classList.toggle('register-mode');

            setTimeout(() => {
                if (card.classList.contains('register-mode')) {
                    login.classList.add('auth-hidden');
                    register.classList.remove('auth-hidden');
                    sideText.innerText = "¿Ya tienes una cuenta?";
                    btnToggle.innerText = "Iniciar Sesión";
                } else {
                    login.classList.remove('auth-hidden');
                    register.classList.add('auth-hidden');
                    sideText.innerText = "¿No tienes una cuenta?";
                    btnToggle.innerText = "Registrarse";
                }
            }, 300);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Moderación - Proyecto Red Social</title>
    
    <script>
        (function() {
            const rol = localStorage.getItem('rol') || localStorage.getItem('usuarioRol');
            const miId = localStorage.getItem('usuarioId');

            if (rol !== 'admin' && miId !== '1') {
                alert("🛑 ACCESO DENEGADO: Área restringida para administración.");
                window.location.href = 'index.html'; 
            }
        })();
    </script>

    <link rel="stylesheet" href="css/general.css">       <link rel="stylesheet" href="css/admin_reportes.css"> </head>
<body>
    <header class="main-header">
        <h1>⚖️ Centro de Justicia Social</h1>
        <nav>
            <a href="index.html" class="btn-base btn-secundario">Volver al Muro</a>
        </nav>
    </header>

    <main class="container">
        <section class="card">
            <header class="justicia-header">
                <h2>Denuncias Pendientes</h2>
                <p>Gestión de integridad y seguridad de la comunidad.</p>
            </header>

            <div class="reportes-table-container">
                <table class="reportes-table">
                    <thead>
                        <tr>
                            <th>Denunciante</th>
                            <th>Publicación (Contenido)</th>
                            <th>Autor del Post</th>
                            <th>Motivo</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-reportes">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/admin_reportes.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Moderación - Arquitecto Israel</title>
    <link rel="stylesheet" href="css/general.css">
</head>
<body style="background: #f0f2f5;">
    <header class="main-header">
        <h1>⚖️ Centro de Justicia Social</h1>
        <a href="index.html" class="btn-secundario">Volver al Muro</a>
    </header>

    <main class="container">
        <section class="card">
            <h2>Denuncias Pendientes</h2>
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <thead>
                    <tr style="background: #e4e6eb; text-align: left;">
                        <th style="padding: 10px;">Denunciante</th>
                        <th style="padding: 10px;">Publicación (Contenido)</th>
                        <th style="padding: 10px;">Autor del Post</th>
                        <th style="padding: 10px;">Motivo</th>
                        <th style="padding: 10px;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-reportes">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="js/admin_reportes.js"></script>
</body>
</html>

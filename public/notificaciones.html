<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Notificaciones - Facebook Local</title>
    <script src="js/guardia.js"></script>
    <link rel="stylesheet" href="css/general.css"> <link rel="stylesheet" href="css/notificaciones.css"> </head>
<body>
    <header class="main-header">
        <div class="logo"><h1>Facebook Local</h1></div>
        
        <nav>
            <a href="index.html">Muro</a>
            <a href="perfil.html" id="nav-nombre">Mi Perfil</a> 
            <a href="mensajes.html">Mensajes</a>
            
            <a href="notificaciones.html" class="nav-notif-wrapper active-link">
                Notificaciones
                <span id="contador-notificaciones" class="badge-notif">0</span>
            </a>
            
            <a href="#" id="btn-salir" class="nav-logout">Cerrar Sesión</a>
            <button id="btn-tema" class="btn-base">🌙 Modo Oscuro</button>
        </nav>
    </header>

    <main class="container">
        <div class="card notif-container">
            <div class="header-notif">
                <h2>Actividad Reciente</h2>
                <button id="btn-marcar-leidas" class="btn-base btn-small">
                    Marcar todo como leído
                </button>
            </div>
            
            <hr class="separator">
            
            <div id="lista-notificaciones">
                <p class="notif-placeholder">Buscando alertas en la base de datos... 🔍</p>
            </div>
        </div>
    </main>

    <script src="js/tema.js"></script>
    <script src="js/usuario_global.js"></script>
    <script src="js/notificaciones.js"></script>
    <script src="js/eventos.js"></script> 
    
    <script>
        // Lógica de cierre de sesión (Mantenida intacta)
        document.getElementById('btn-salir').addEventListener('click', (e) => {
            e.preventDefault();
            if(confirm("¿Estás seguro de que deseas cerrar sesión?")) {
                localStorage.removeItem('usuarioId');
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
